name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v2.0.0, v2.1.0, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore AssetStudio.sln
      
    - name: Build CLI (net10.0-windows)
      run: dotnet build AssetStudio.CLI/AssetStudio.CLI.csproj -c Release -f net10.0-windows --no-restore
      
    - name: Build GUI (net10.0-windows)
      run: dotnet build AssetStudio.GUI/AssetStudio.GUI.csproj -c Release -f net10.0-windows --no-restore
      
    - name: Prepare Release Package
      run: |
        mkdir release
        Get-ChildItem "AssetStudio.GUI/bin/Release/net10.0-windows" -Recurse | Where-Object { $_.Extension -ne ".pdb" } | ForEach-Object {
          $dest = $_.FullName.Replace((Resolve-Path "AssetStudio.GUI/bin/Release/net10.0-windows").Path, (Resolve-Path "release").Path)
          $destDir = Split-Path $dest -Parent
          if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
          Copy-Item $_.FullName -Destination $dest -Force
        }
        Compress-Archive -Path "release/*" -DestinationPath "AssetStudio-net10.0-win.zip"
      shell: pwsh
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          AssetStudio-net10.0-win.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## AssetStudio Release ${{ github.ref_name }}
          
          ### What's Included
          Complete package with both CLI and GUI executables:
          - **AssetStudio.GUI.exe**: Visual interface for interactive use
          - **AssetStudio.CLI.exe**: Command-line tool for automation and batch processing
          
          ### Requirements
          - Windows OS
          - [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0) (Desktop Runtime)
          
          ### Unity Support
          - Unity 2.x through Unity 6 (6000.0 - 6000.4+)
          - Full texture decoding support including Unity 2023.2+ format changes
          
          ### Features
          - Extract and export Unity assets (textures, meshes, audio, etc.)
          - Multiple export formats for textures (PNG, JPEG, BMP, WebP)
          - FBX export for 3D models
          - Asset filtering and batch processing
          
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
