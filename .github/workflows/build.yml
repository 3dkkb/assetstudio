name: Build

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**/LICENSE'
      - '**/README.md'
      - '**/.gitignore'
      - '**/.gitattributes'
      - '*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore AssetStudio.sln

      - name: Build CLI (net8.0-windows)
        run: dotnet build AssetStudio.CLI/AssetStudio.CLI.csproj -c Release -f net8.0-windows --no-restore

      - name: Build GUI (net8.0-windows)
        run: dotnet build AssetStudio.GUI/AssetStudio.GUI.csproj -c Release -f net8.0-windows --no-restore

      - name: Build CLI (net10.0-windows)
        run: dotnet build AssetStudio.CLI/AssetStudio.CLI.csproj -c Release -f net10.0-windows --no-restore

      - name: Build GUI (net10.0-windows)
        run: dotnet build AssetStudio.GUI/AssetStudio.GUI.csproj -c Release -f net10.0-windows --no-restore

      - name: Upload .NET 8 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-net8.0-${{ github.sha }}
          path: AssetStudio.GUI/bin/Release/net8.0-windows/
          retention-days: 14

      - name: Upload .NET 10 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-net10.0-${{ github.sha }}
          path: AssetStudio.GUI/bin/Release/net10.0-windows/
          retention-days: 14
